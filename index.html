<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#070914">
<meta name="description" content="عيدية رقمية مهداة من أبو عبيدة عبد المجيد — عيد مبارك">

<title>عيدية ⋅ أبو عبيدة عبد المجيد</title>

<meta property="og:type" content="website">

<meta property="og:description" content="اضغط لفتح العيدية ✦ تقبّل الله منّا ومنكم">

<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='%23f4d56e'/></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-0: #050714;
    --bg-1: #0a0e27;
    --bg-2: #1a1040;
    --gold-0: #fff8d8;
    --gold-1: #ffe7a3;
    --gold-2: #f4d56e;
    --gold-3: #d4af37;
    --gold-4: #a07a1a;
    --ink-light: #cbd3f0;
    --ink-dim:   #6a72a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg-0); color: var(--gold-1); }
  body {
    font-family: 'Reem Kufi', sans-serif;
    position: relative;
    overscroll-behavior: none;
    user-select: none;
  }

  /* ============ Cosmic background ============ */
  .cosmos {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(74, 29, 94, 0.35), transparent 60%),
      radial-gradient(ellipse 90% 70% at 80% 90%, rgba(26, 39, 97, 0.45), transparent 60%),
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(26, 16, 64, 0.6), transparent 70%),
      linear-gradient(180deg, #050714 0%, #0a0e27 50%, #15082a 100%);
  }
  #stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ============ Scene framework ============ */
  .scene { position: fixed; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 1s ease, transform 1.2s cubic-bezier(.16,1,.3,1); padding: 24px; }
  .scene.hidden { opacity: 0; pointer-events: none; }
  .scene.zoom-out { transform: scale(2.5); opacity: 0; }

  /* ============ Cover Scene (Orb) ============ */
  .orb-stage {
    position: relative;
    width: min(78vw, 420px);
    height: min(78vw, 420px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* Outer halo */
  .orb-halo {
    position: absolute; inset: -40%;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(244, 213, 110, 0.18) 0%, rgba(244, 213, 110, 0.08) 30%, transparent 60%);
    filter: blur(20px);
    animation: halo-pulse 4s ease-in-out infinite;
  }
  @keyframes halo-pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50%      { transform: scale(1.12); opacity: 1; }
  }

  /* Mid ring */
  .orb-ring {
    position: absolute; inset: -8%;
    border-radius: 50%;
    border: 1px solid rgba(244, 213, 110, 0.25);
    box-shadow: inset 0 0 40px rgba(244, 213, 110, 0.1), 0 0 30px rgba(244, 213, 110, 0.08);
    animation: ring-spin 28s linear infinite;
  }
  .orb-ring::before, .orb-ring::after {
    content: ''; position: absolute;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold-2);
    box-shadow: 0 0 14px var(--gold-2);
  }
  .orb-ring::before { top: -3px; left: 50%; transform: translateX(-50%); }
  .orb-ring::after  { bottom: -3px; left: 50%; transform: translateX(-50%); }
  @keyframes ring-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* The orb itself */
  .orb {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.95) 0%, rgba(255, 248, 216, 0.6) 8%, transparent 22%),
      radial-gradient(circle at 35% 30%, var(--gold-0) 0%, var(--gold-2) 25%, var(--gold-3) 55%, var(--gold-4) 80%, #3d2a08 100%);
    box-shadow:
      inset -30px -40px 80px rgba(0, 0, 0, 0.55),
      inset 20px 30px 60px rgba(255, 248, 216, 0.25),
      0 0 80px rgba(244, 213, 110, 0.55),
      0 0 160px rgba(244, 213, 110, 0.35),
      0 0 260px rgba(244, 213, 110, 0.2);
    animation: orb-breathe 5s ease-in-out infinite;
    overflow: hidden;
  }
  @keyframes orb-breathe {
    0%, 100% { box-shadow: inset -30px -40px 80px rgba(0,0,0,0.55), inset 20px 30px 60px rgba(255,248,216,0.25), 0 0 80px rgba(244,213,110,0.55), 0 0 160px rgba(244,213,110,0.35), 0 0 260px rgba(244,213,110,0.18); }
    50%      { box-shadow: inset -30px -40px 80px rgba(0,0,0,0.55), inset 20px 30px 60px rgba(255,248,216,0.35), 0 0 100px rgba(244,213,110,0.7),  0 0 200px rgba(244,213,110,0.45), 0 0 320px rgba(244,213,110,0.28); }
  }

  /* Surface highlights */
  .orb::before {
    content: '';
    position: absolute;
    top: 12%; left: 18%;
    width: 30%; height: 22%;
    background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.85), transparent 70%);
    border-radius: 50%;
    filter: blur(2px);
  }
  .orb::after {
    content: '';
    position: absolute;
    bottom: 18%; right: 22%;
    width: 18%; height: 12%;
    background: radial-gradient(ellipse at center, rgba(255, 235, 170, 0.5), transparent 70%);
    border-radius: 50%;
    filter: blur(3px);
  }

  /* Orb label */
  .orb-label {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    z-index: 2;
    color: rgba(50, 25, 5, 0.85);
    text-shadow: 0 1px 2px rgba(255, 255, 255, 0.3);
    text-align: center;
    padding: 0 12%;
  }
  .orb-eid-id {
    font-family: 'Inter', sans-serif;
    font-size: clamp(9px, 1.8vw, 13px);
    letter-spacing: 4px;
    font-weight: 500;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .orb-eid-text {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: clamp(36px, 9vw, 64px);
    line-height: 1.05;
    background: linear-gradient(180deg, #4a2c0a 0%, #2a1604 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .orb-eid-sub {
    font-family: 'Reem Kufi', sans-serif;
    font-size: clamp(11px, 2.2vw, 15px);
    margin-top: 8px;
    opacity: 0.7;
    letter-spacing: 2px;
  }

  /* Cover header */
  .cover-header {
    position: fixed; top: max(28px, env(safe-area-inset-top));
    left: 0; right: 0;
    text-align: center;
    z-index: 3;
    padding: 0 24px;
  }
  .cover-header .label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .cover-header .from {
    font-family: 'Aref Ruqaa', serif;
    font-size: clamp(20px, 4.5vw, 28px);
    font-weight: 700;
    background: linear-gradient(180deg, var(--gold-0), var(--gold-3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Cover footer */
  .cover-footer {
    position: fixed; bottom: max(32px, env(safe-area-inset-bottom));
    left: 0; right: 0;
    text-align: center;
    z-index: 3;
  }
  .tap-hint {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Reem Kufi', sans-serif;
    color: var(--gold-2);
    font-size: 16px;
    letter-spacing: 3px;
    padding: 12px 24px;
    border: 1px solid rgba(244, 213, 110, 0.3);
    border-radius: 100px;
    background: rgba(244, 213, 110, 0.05);
    backdrop-filter: blur(8px);
    animation: tap-pulse 2s ease-in-out infinite;
  }
  .tap-hint .arrow {
    display: inline-block;
    width: 6px; height: 6px;
    border: 1.5px solid var(--gold-2);
    border-left: none; border-bottom: none;
    transform: rotate(45deg);
  }
  @keyframes tap-pulse {
    0%, 100% { opacity: 0.7; transform: translateY(0); }
    50%      { opacity: 1; transform: translateY(-4px); }
  }

  /* Lanterns - cover scene */
  .lantern { position: fixed; z-index: 2; pointer-events: none; transform-origin: top center; }
  .lantern svg { display: block; filter: drop-shadow(0 0 12px rgba(244, 213, 110, 0.5)); }
  .lantern.l1 { top: 14%; left: 5%;  width: 80px; animation: sway 4s ease-in-out infinite; }
  .lantern.l2 { top: 22%; right: 7%; width: 64px; animation: sway 5s ease-in-out infinite reverse; }
  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50%      { transform: rotate(3deg); }
  }

  /* ============ Card Scene ============ */
  #card-scene { opacity: 0; transform: scale(0.92); pointer-events: none; }
  #card-scene.active { opacity: 1; transform: scale(1); pointer-events: auto; transition: opacity 1.2s ease 0.3s, transform 1.4s cubic-bezier(.16,1,.3,1) 0.3s; }

  .card-frame {
    position: relative;
    width: min(92vw, 540px);
    max-height: calc(100dvh - 48px);
    padding: 48px 32px 36px;
    border-radius: 28px;
    background:
      linear-gradient(180deg, rgba(10, 14, 39, 0.85) 0%, rgba(26, 16, 64, 0.85) 100%);
    border: 1px solid rgba(244, 213, 110, 0.25);
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.55),
      0 0 80px rgba(244, 213, 110, 0.1),
      inset 0 0 40px rgba(244, 213, 110, 0.04);
    backdrop-filter: blur(8px);
    text-align: center;
    overflow: hidden;
  }

  /* Corner ornaments */
  .card-frame::before, .card-frame::after {
    content: '';
    position: absolute;
    width: 50px; height: 50px;
    border: 1.5px solid var(--gold-3);
    opacity: 0.5;
  }
  .card-frame::before { top: 14px; right: 14px; border-left: none; border-bottom: none; border-top-right-radius: 8px; }
  .card-frame::after  { bottom: 14px; left: 14px; border-right: none; border-top: none; border-bottom-left-radius: 8px; }
  .card-frame > .corner-tl, .card-frame > .corner-br {
    position: absolute; width: 50px; height: 50px;
    border: 1.5px solid var(--gold-3); opacity: 0.5;
  }
  .card-frame > .corner-tl { top: 14px; left: 14px; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
  .card-frame > .corner-br { bottom: 14px; right: 14px; border-left: none; border-top: none; border-bottom-right-radius: 8px; }

  /* Crescent on card */
  .crescent-wrap {
    position: relative;
    width: 110px; height: 110px;
    margin: 4px auto 18px;
  }
  .crescent {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--gold-0), var(--gold-2) 50%, var(--gold-3) 90%);
    box-shadow:
      0 0 30px rgba(244, 213, 110, 0.5),
      0 0 60px rgba(244, 213, 110, 0.3);
    overflow: hidden;
  }
  .crescent::after {
    content: '';
    position: absolute;
    top: -8%; right: -25%;
    width: 95%; height: 110%;
    border-radius: 50%;
    background: rgba(10, 14, 39, 0.98);
  }
  .crescent-stars {
    position: absolute;
    top: 50%;
    left: -16px;
    transform: translateY(-50%);
    color: var(--gold-2);
    font-size: 12px;
    opacity: 0.7;
    animation: twinkle 2s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.4; transform: translateY(-50%) scale(0.9); }
    50%      { opacity: 1;   transform: translateY(-50%) scale(1.1); }
  }

  .eid-label-small {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .eid-title {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: clamp(64px, 14vw, 96px);
    line-height: 1;
    background: linear-gradient(180deg, var(--gold-0) 0%, var(--gold-2) 40%, var(--gold-3) 75%, var(--gold-4) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 40px rgba(244, 213, 110, 0.25);
    margin: 8px 0 6px;
  }

  .eid-subtitle {
    font-family: 'Reem Kufi', sans-serif;
    font-size: clamp(13px, 2.8vw, 16px);
    letter-spacing: 4px;
    color: var(--gold-2);
    opacity: 0.85;
    margin-bottom: 24px;
  }

  .divider-line {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin: 18px 0;
  }
  .divider-line .ln {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-3), transparent);
  }
  .divider-line .dot {
    width: 8px; height: 8px;
    background: var(--gold-2);
    transform: rotate(45deg);
    box-shadow: 0 0 10px var(--gold-2);
  }

  .eid-message {
    font-family: 'Amiri', serif;
    font-size: clamp(15px, 3.2vw, 19px);
    line-height: 1.9;
    color: #ebd9b0;
    margin: 6px 16px 24px;
  }
  .eid-message strong {
    color: var(--gold-1);
    font-weight: 700;
  }

  .mosque-art {
    margin: 8px auto 18px;
    width: 100%; max-width: 380px;
    display: block;
    opacity: 0.85;
  }

  .sender-block {
    margin-top: 14px;
    padding-top: 18px;
    border-top: 1px solid rgba(244, 213, 110, 0.15);
  }
  .sender-block .from-line {
    font-family: 'Reem Kufi', sans-serif;
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .sender-block .from-name-big {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: clamp(22px, 5vw, 30px);
    background: linear-gradient(180deg, var(--gold-0), var(--gold-3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Action buttons (post-open) */
  .card-actions {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 0; right: 0;
    display: flex; justify-content: center; gap: 12px;
    z-index: 4;
    opacity: 0;
    transition: opacity 0.6s ease 1.8s;
  }
  #card-scene.active ~ .card-actions { opacity: 1; }

  .action-btn {
    background: rgba(244, 213, 110, 0.08);
    border: 1px solid rgba(244, 213, 110, 0.3);
    color: var(--gold-2);
    padding: 10px 18px;
    border-radius: 100px;
    font-family: 'Reem Kufi', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 0.3s ease;
  }
  .action-btn:hover, .action-btn:active {
    background: rgba(244, 213, 110, 0.15);
    border-color: var(--gold-2);
    transform: translateY(-2px);
  }
  .action-btn svg { width: 16px; height: 16px; }

  /* Particle canvas (gold sparkles) */
  #particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

  /* Burst container (one-shot on open) */
  #burst-canvas { position: fixed; inset: 0; z-index: 10; pointer-events: none; opacity: 0; }
  #burst-canvas.active { opacity: 1; }

  /* Initial entrance */
  .scene:not(.hidden) { animation: fade-in 1.4s ease forwards; }
  @keyframes fade-in { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

  /* Watermark */
  .watermark {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--ink-dim);
    opacity: 0.5;
    z-index: 5;
    text-transform: uppercase;
  }
  #card-scene .watermark { opacity: 0.6; }

  /* Mobile tuning */
  @media (max-width: 480px) {
    .card-frame { padding: 40px 22px 28px; }
    .lantern.l1 { width: 60px; }
    .lantern.l2 { width: 50px; }
    .cover-header .label { letter-spacing: 4px; }
  }
  @media (max-height: 640px) {
    .orb-stage { width: min(60vw, 280px); height: min(60vw, 280px); }
    .lantern { display: none; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001s !important;
      transition-duration: 0.2s !important;
    }
  }
</style>
</head>
<body>

<div class="cosmos"></div>
<canvas id="stars"></canvas>
<canvas id="particles"></canvas>

<div class="watermark">EID · 1447 / 2026</div>

<!-- ============ COVER SCENE ============ -->
<section id="cover-scene" class="scene">
  <div class="cover-header">
    <div class="label">عيدية مهداة من</div>
    <div class="from">أبو عبيدة عبد المجيد</div>
  </div>

  <div class="orb-stage" id="orb-stage" role="button" tabindex="0" aria-label="افتح العيدية">
    <div class="orb-halo"></div>
    <div class="orb-ring"></div>
    <div class="orb">
      <div class="orb-label">
        <div class="orb-eid-id">EID · MUBARAK</div>
        <div class="orb-eid-text">عيدية</div>
        <div class="orb-eid-sub">١٤٤٧ هـ</div>
      </div>
    </div>
  </div>

  <!-- Lanterns -->
  <div class="lantern l1">
    <svg viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
      <line x1="30" y1="0" x2="30" y2="18" stroke="#d4af37" stroke-width="1.5"/>
      <rect x="22" y="16" width="16" height="6" fill="#d4af37"/>
      <path d="M 15 26 Q 30 22 45 26 L 48 68 Q 30 76 12 68 Z" fill="url(#lg1)" stroke="#d4af37" stroke-width="1.5"/>
      <line x1="20" y1="32" x2="20" y2="62" stroke="#a07a1a" stroke-width="0.6"/>
      <line x1="30" y1="30" x2="30" y2="66" stroke="#a07a1a" stroke-width="0.6"/>
      <line x1="40" y1="32" x2="40" y2="62" stroke="#a07a1a" stroke-width="0.6"/>
      <rect x="22" y="66" width="16" height="6" fill="#d4af37"/>
      <line x1="30" y1="72" x2="30" y2="88" stroke="#d4af37" stroke-width="1"/>
      <path d="M 26 88 Q 30 96 34 88" fill="none" stroke="#d4af37" stroke-width="1.5"/>
      <defs>
        <radialGradient id="lg1" cx="50%" cy="40%">
          <stop offset="0%" stop-color="#fff8d8" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#d4af37" stop-opacity="0.6"/>
        </radialGradient>
      </defs>
    </svg>
  </div>
  <div class="lantern l2">
    <svg viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
      <line x1="30" y1="0" x2="30" y2="18" stroke="#d4af37" stroke-width="1.5"/>
      <rect x="22" y="16" width="16" height="6" fill="#d4af37"/>
      <path d="M 15 26 Q 30 22 45 26 L 48 68 Q 30 76 12 68 Z" fill="url(#lg2)" stroke="#d4af37" stroke-width="1.5"/>
      <rect x="22" y="66" width="16" height="6" fill="#d4af37"/>
      <line x1="30" y1="72" x2="30" y2="88" stroke="#d4af37" stroke-width="1"/>
      <path d="M 26 88 Q 30 96 34 88" fill="none" stroke="#d4af37" stroke-width="1.5"/>
      <defs>
        <radialGradient id="lg2" cx="50%" cy="40%">
          <stop offset="0%" stop-color="#fff8d8" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#d4af37" stop-opacity="0.6"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <div class="cover-footer">
    <button class="tap-hint" id="open-btn">
      <span class="arrow"></span>
      <span>اضغط لفتح العيدية</span>
      <span class="arrow" style="transform: rotate(-135deg);"></span>
    </button>
  </div>
</section>

<!-- ============ BURST CANVAS ============ -->
<canvas id="burst-canvas"></canvas>

<!-- ============ CARD SCENE ============ -->
<section id="card-scene" class="scene hidden">
  <div class="card-frame">
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="crescent-wrap">
      <div class="crescent"></div>
      <span class="crescent-stars">✦</span>
    </div>

    <div class="eid-label-small">EID · MUBARAK</div>
    <h1 class="eid-title">عيدٌ مبارك</h1>
    <div class="eid-subtitle">و كل عام و أنتم بخير</div>

    <div class="divider-line">
      <span class="ln"></span><span class="dot"></span><span class="ln"></span>
    </div>

    <p class="eid-message">
      <strong>تقبَّل اللهُ منَّا ومنكم</strong> صالحَ الأعمال،<br>
      وأعاده عليكم بالخيرِ واليُمنِ والبركات.<br>
      كلُّ عامٍ وأنتم بألفِ خير.
    </p>

    <svg class="mosque-art" viewBox="0 0 380 110" preserveAspectRatio="xMidYMax meet">
      <defs>
        <linearGradient id="mg" x1="0" x2="0" y1="0" y2="1">

      <rect x="90" y="65" width="200" height="45" fill="url(#mg)" stroke="#d4af37" stroke-width="0.8"/>
      <path d="M 130 65 Q 130 30 190 30 Q 250 30 250 65 Z" fill="url(#mg)" stroke="#d4af37" stroke-width="1"/>
      <circle cx="190" cy="30" r="2.5" fill="#d4af37"/>
      <line x1="190" y1="27" x2="190" y2="18" stroke="#d4af37" stroke-width="1"/>

      <path d="M 245 65 Q 245 52 260 52 Q 275 52 275 65 Z" fill="url(#mg)" stroke="#d4af37" stroke-width="0.7"/>
      <line x1="260" y1="52" x2="260" y2="46" stroke="#d4af37" stroke-width="0.7"/>

      <path d="M 180 110 L 180 88 Q 180 78 190 78 Q 200 78 200 88 L 200 110 Z" fill="#0a0e27" stroke="#d4af37" stroke-width="0.8"/>
      <path d="M 145 100 L 145 88 Q 145 81 152 81 Q 159 81 159 88 L 159 100 Z" fill="#0a0e27" stroke="#d4af37" stroke-width="0.5" opacity="0.8"/>

    <div class="sender-block">
      <div class="from-line">مع أطيب التهاني من</div>
      <div class="from-name-big">أبو عبيدة عبد المجيد</div>
    </div>
  </div>
</section>

<!-- ============ ACTION BUTTONS ============ -->
<div class="card-actions" id="card-actions">
  <button class="action-btn" id="share-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
    <span>مشاركة</span>
  </button>
  <button class="action-btn" id="replay-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9"/><polyline points="3 4 3 12 11 12"/>
    </svg>
    <span>إعادة</span>
  </button>
</div>

<script>
(function () {
  'use strict';

  /* ============================================================
     STARFIELD — layered, parallax, twinkling
     ============================================================ */
  const starsCanvas = document.getElementById('stars');
  const starsCtx = starsCanvas.getContext('2d');
  let stars = [];
  let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

  function resize() {
    starsCanvas.width  = innerWidth  * dpr;
    starsCanvas.height = innerHeight * dpr;
    starsCanvas.style.width  = innerWidth + 'px';
    starsCanvas.style.height = innerHeight + 'px';
    starsCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    particlesCanvas.width  = innerWidth  * dpr;
    particlesCanvas.height = innerHeight * dpr;
    particlesCanvas.style.width  = innerWidth + 'px';
    particlesCanvas.style.height = innerHeight + 'px';
    particlesCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    burstCanvas.width  = innerWidth  * dpr;
    burstCanvas.height = innerHeight * dpr;
    burstCanvas.style.width  = innerWidth + 'px';
    burstCanvas.style.height = innerHeight + 'px';
    burstCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    initStars();
  }

  function initStars() {
    stars = [];
    const count = Math.min(240, Math.floor((innerWidth * innerHeight) / 6000));
    for (let i = 0; i < count; i++) {
      const layer = Math.random() < 0.6 ? 0 : (Math.random() < 0.7 ? 1 : 2);
      stars.push({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        r: layer === 2 ? Math.random() * 1.6 + 0.8 : layer === 1 ? Math.random() * 1.2 + 0.4 : Math.random() * 0.7 + 0.2,
        baseA: 0.3 + Math.random() * 0.7,
        phase: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 1.6,
        layer,
        hue: Math.random() < 0.15 ? 1 : 0  // small chance of warm-tinted star
      });
    }
  }

  let mouseX = 0, mouseY = 0;
  let targetMouseX = 0, targetMouseY = 0;
  addEventListener('mousemove', (e) => {
    targetMouseX = (e.clientX / innerWidth  - 0.5) * 2;
    targetMouseY = (e.clientY / innerHeight - 0.5) * 2;
  });
  addEventListener('deviceorientation', (e) => {
    if (e.gamma != null && e.beta != null) {
      targetMouseX = Math.max(-1, Math.min(1, e.gamma / 30));
      targetMouseY = Math.max(-1, Math.min(1, e.beta  / 45));
    }
  });

  function drawStars(t) {
    mouseX += (targetMouseX - mouseX) * 0.04;
    mouseY += (targetMouseY - mouseY) * 0.04;

    starsCtx.clearRect(0, 0, innerWidth, innerHeight);

    for (const s of stars) {
      const parallax = (s.layer + 1) * 6;
      const x = s.x - mouseX * parallax;
      const y = s.y - mouseY * parallax;
      const a = s.baseA * (0.55 + 0.45 * Math.sin(t * 0.001 * s.speed + s.phase));
      starsCtx.beginPath();
      starsCtx.fillStyle = s.hue
        ? `rgba(255, 231, 163, ${a})`
        : `rgba(255, 255, 255, ${a})`;
      starsCtx.arc(x, y, s.r, 0, Math.PI * 2);
      starsCtx.fill();
      if (s.layer === 2) {
        starsCtx.shadowBlur = 6;
        starsCtx.shadowColor = s.hue ? 'rgba(255, 231, 163, 0.8)' : 'rgba(255, 255, 255, 0.8)';
        starsCtx.fill();
        starsCtx.shadowBlur = 0;
      }
    }
  }

  /* ============================================================
     GOLD PARTICLES — drifting upward
     ============================================================ */
  const particlesCanvas = document.getElementById('particles');
  const particlesCtx = particlesCanvas.getContext('2d');
  let particles = [];

  function spawnParticle() {
    particles.push({
      x: Math.random() * innerWidth,
      y: innerHeight + 10,
      r: Math.random() * 1.6 + 0.6,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -(Math.random() * 0.6 + 0.2),
      a: 0,
      maxA: Math.random() * 0.6 + 0.2,
      life: 0,
      maxLife: 400 + Math.random() * 400,
      drift: Math.random() * Math.PI * 2,
      driftSpeed: 0.01 + Math.random() * 0.02
    });
  }

  function drawParticles() {
    particlesCtx.clearRect(0, 0, innerWidth, innerHeight);
    if (Math.random() < 0.4 && particles.length < 80) spawnParticle();

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life++;
      p.drift += p.driftSpeed;
      p.x += p.vx + Math.sin(p.drift) * 0.25;
      p.y += p.vy;

      if (p.life < 80)               p.a = (p.life / 80) * p.maxA;
      else if (p.life > p.maxLife - 80) p.a = ((p.maxLife - p.life) / 80) * p.maxA;
      else                            p.a = p.maxA;

      if (p.life > p.maxLife || p.y < -10) {
        particles.splice(i, 1);
        continue;
      }

      particlesCtx.beginPath();
      particlesCtx.fillStyle = `rgba(244, 213, 110, ${p.a})`;
      particlesCtx.shadowBlur = 10;
      particlesCtx.shadowColor = `rgba(244, 213, 110, ${p.a * 0.8})`;
      particlesCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      particlesCtx.fill();
      particlesCtx.shadowBlur = 0;
    }
  }

  /* ============================================================
     BURST — one-shot golden explosion on open
     ============================================================ */
  const burstCanvas = document.getElementById('burst-canvas');
  const burstCtx = burstCanvas.getContext('2d');
  let burstParticles = [];
  let burstActive = false;

  function fireBurst() {
    const cx = innerWidth / 2;
    const cy = innerHeight / 2;
    const count = 140;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.3;
      const speed = Math.random() * 8 + 3;
      burstParticles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: Math.random() * 3 + 1,
        a: 1,
        decay: 0.005 + Math.random() * 0.01,
        col: Math.random() < 0.3 ? '255, 255, 255' : '244, 213, 110'
      });
    }
    burstActive = true;
    burstCanvas.classList.add('active');
  }

  function drawBurst() {
    if (!burstActive) return;
    burstCtx.clearRect(0, 0, innerWidth, innerHeight);
    let alive = 0;
    for (const p of burstParticles) {
      if (p.a <= 0) continue;
      alive++;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.96; p.vy *= 0.96;
      p.vy += 0.04;
      p.a -= p.decay;

      burstCtx.beginPath();
      burstCtx.fillStyle = `rgba(${p.col}, ${Math.max(0, p.a)})`;
      burstCtx.shadowBlur = 16;
      burstCtx.shadowColor = `rgba(${p.col}, ${Math.max(0, p.a * 0.8)})`;
      burstCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      burstCtx.fill();
      burstCtx.shadowBlur = 0;
    }
    if (alive === 0) {
      burstActive = false;
      burstParticles = [];
      burstCanvas.classList.remove('active');
      burstCtx.clearRect(0, 0, innerWidth, innerHeight);
    }
  }

  /* ============================================================
     MAIN LOOP
     ============================================================ */
  function loop(t) {
    drawStars(t);
    drawParticles();
    drawBurst();
    requestAnimationFrame(loop);
  }

  /* ============================================================
     OPEN INTERACTION
     ============================================================ */
  const coverScene = document.getElementById('cover-scene');
  const cardScene  = document.getElementById('card-scene');
  const orbStage   = document.getElementById('orb-stage');
  const openBtn    = document.getElementById('open-btn');
  let opened = false;

  function openCard() {
    if (opened) return;
    opened = true;

    fireBurst();

    // Zoom orb out
    coverScene.classList.add('zoom-out');
    setTimeout(() => {
      coverScene.classList.add('hidden');
      cardScene.classList.remove('hidden');
      // force reflow
      void cardScene.offsetWidth;
      cardScene.classList.add('active');
    }, 700);
  }

  function closeCard() {
    if (!opened) return;
    opened = false;
    cardScene.classList.remove('active');
    setTimeout(() => {
      cardScene.classList.add('hidden');
      coverScene.classList.remove('hidden');
      coverScene.classList.remove('zoom-out');
    }, 600);
  }

  orbStage.addEventListener('click', openCard);
  orbStage.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openCard(); }
  });
  openBtn.addEventListener('click', (e) => { e.stopPropagation(); openCard(); });
  document.getElementById('replay-btn').addEventListener('click', closeCard);

  /* Share */
  document.getElementById('share-btn').addEventListener('click', async () => {
    const url   = location.href;
    const text  = 'عيد مبارك ✦ تقبّل الله منا ومنكم';
    if (navigator.share) {
      try { await navigator.share({ title: 'عيد مبارك', text, url }); }
      catch (e) {}
    } else {
      try {
        await navigator.clipboard.writeText(text + '\n' + url);
        const btn = document.getElementById('share-btn');
        const old = btn.querySelector('span').textContent;
        btn.querySelector('span').textContent = 'تم النسخ ✓';
        setTimeout(() => btn.querySelector('span').textContent = old, 1800);
      } catch (e) {
        window.open('https://wa.me/?text=' + encodeURIComponent(text + ' ' + url), '_blank');
      }
    }
  });

  /* ============================================================
     INIT
     ============================================================ */
  addEventListener('resize', resize);
  resize();
  requestAnimationFrame(loop);

  // Deep-link to card view (used for previews / shared links)
  if (location.hash === '#card' || location.search.includes('card')) {
    // Skip the burst when deep-linking
    const skipBurst = location.search.includes('nofx');
    setTimeout(() => {
      if (skipBurst) {
        coverScene.classList.add('hidden');
        cardScene.classList.remove('hidden');
        void cardScene.offsetWidth;
        cardScene.classList.add('active');
        opened = true;
      } else {
        openCard();
      }
    }, 200);
  }
})();
</script>
</body>
